title: Logos
description: "Essays on philosophy, mathematics, science and society."

# Defines the category buttons in the nav — add/remove as needed
categories_list:
  - Philosophy
  - Mathematics
  - Science
  - Society

# Tells Jekyll to build _essays/ into pages
collections:
  essays:
    output: true
    permalink: /essays/:name/

# Remove the default Minima theme entirely
theme: null
