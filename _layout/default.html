<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.dek %}{{ page.dek }}{% else %}{{ site.description }}{% endif %}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+SC:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <div id="progress-bar"></div>

  <nav>
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="site-name">{{ site.title }}</a>
      <ul class="nav-links">
        {% for cat in site.categories_list %}
        <li><a href="{{ '/categories/' | append: cat | downcase | relative_url }}">{{ cat }}</a></li>
        {% endfor %}
        <li><a href="{{ '/about' | relative_url }}">About</a></li>
      </ul>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>© {{ 'now' | date: "%Y" }} {{ site.title }}&nbsp;·&nbsp;
      <a href="{{ '/about' | relative_url }}">About</a>&nbsp;·&nbsp;
      <a href="/feed.xml">RSS</a>
    </p>
  </footer>

  <script>
    const bar = document.getElementById('progress-bar');
    window.addEventListener('scroll', () => {
      const scrolled = window.scrollY;
      const total = document.documentElement.scrollHeight - window.innerHeight;
      if (total > 0) bar.style.width = (scrolled / total * 100) + '%';
    });
  </script>
</body>
</html>
