---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.dek %}{{ page.dek }}{% elsif site.description %}{{ site.description }}{% endif %}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+SC:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ─── Tokens ─────────────────────────────────────────── */
    :root {
      --ink:        #1a1714;
      --ink-light:  #5a5450;
      --ink-faint:  #9a9490;
      --paper:      #faf8f4;
      --paper-warm: #f2ede4;
      --accent:     #b04a2a;
      --accent-dim: #d4795e;
      --rule:       #ddd8cf;
      --col:        680px;
      --wide:       900px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 20px;
      line-height: 1.78;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Reading Progress ───────────────────────────────── */
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: var(--accent);
      z-index: 200;
      transition: width 0.1s linear;
    }

    /* ─── Navigation ─────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      z-index: 100;
      padding: 0 2rem;
    }

    .nav-inner {
      max-width: var(--wide);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .site-name {
      font-family: 'Cormorant SC', serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
    }

    .nav-links a {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--accent); }

    .nav-links button {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-light);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links button:hover { color: var(--accent); }

    .nav-links button.active { color: var(--accent); }
    .nav-links button.active::after {
      content: '';
      position: absolute;
      bottom: -19px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ─── Category Drawer ────────────────────────────────── */
    #category-drawer {
      position: sticky;
      top: 56px;
      z-index: 90;
      background: var(--paper-warm);
      border-bottom: 1px solid var(--rule);
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.38s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity    0.25s ease;
    }

    #category-drawer.open {
      max-height: 420px;
      opacity: 1;
    }

    .drawer-inner {
      max-width: var(--wide);
      margin: 0 auto;
      padding: 2rem 2rem 2.5rem;
    }

    .drawer-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .drawer-title {
      font-family: 'Cormorant SC', serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .drawer-close {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      transition: color 0.2s;
      padding: 0;
    }
    .drawer-close:hover { color: var(--accent); }

    .drawer-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }

    .drawer-card {
      text-decoration: none;
      color: inherit;
      border-top: 1px solid var(--rule);
      padding-top: 0.9rem;
      transition: border-color 0.2s;
      display: block;
    }

    .drawer-card:hover { border-color: var(--accent); }

    .drawer-card-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 0.35rem;
    }

    .drawer-card h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 0.3rem;
      transition: color 0.2s;
    }

    .drawer-card:hover h4 { color: var(--accent); }

    .drawer-card p {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      color: var(--ink-faint);
      line-height: 1.55;
    }

    /* ─── Hero ───────────────────────────────────────────── */
    .hero {
      max-width: var(--wide);
      margin: 0 auto;
      padding: 5rem 2rem 3rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: end;
    }

    .hero-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .hero-category {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
    }

    .hero-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--rule);
    }

    .hero-date {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      color: var(--ink-faint);
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 300;
      line-height: 1.12;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .hero h1 em { font-style: italic; color: var(--accent-dim); }

    .hero-right { padding-bottom: 0.5rem; }

    .hero-dek {
      font-size: 1.2rem;
      font-weight: 300;
      line-height: 1.6;
      color: var(--ink-light);
      font-style: italic;
      margin-bottom: 2rem;
    }

    .hero-author-row { display: flex; align-items: center; gap: 1rem; }

    .author-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--paper-warm);
      border: 1px solid var(--rule);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant SC', serif;
      font-size: 0.9rem;
      color: var(--ink-light);
      flex-shrink: 0;
    }

    .author-info { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; }
    .author-name { font-weight: 500; color: var(--ink); }
    .author-title { color: var(--ink-faint); font-size: 0.72rem; margin-top: 1px; }

    /* ─── Hero Image ─────────────────────────────────────── */
    .hero-image {
      max-width: var(--wide);
      margin: 0 auto;
      padding: 0 2rem;
    }

    .hero-image figure {
      width: 100%;
      aspect-ratio: 16 / 7;
      background: var(--paper-warm);
      border: 1px solid var(--rule);
      overflow: hidden;
      position: relative;
    }

    .hero-image figure img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-image figcaption {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      color: var(--ink-faint);
      margin-top: 0.6rem;
      letter-spacing: 0.03em;
    }

    /* ─── Divider ─────────────────────────────────────────── */
    .section-rule { max-width: var(--wide); margin: 3rem auto; padding: 0 2rem; }
    .section-rule hr { border: none; border-top: 1px solid var(--rule); }

    /* ─── Article Body ────────────────────────────────────── */
    article {
      max-width: var(--col);
      margin: 0 auto;
      padding: 0 2rem 5rem;
    }

    article > p:first-of-type::first-letter {
      font-family: 'Cormorant SC', serif;
      font-size: 4.5em;
      font-weight: 600;
      float: left;
      line-height: 0.78;
      margin: 0.06em 0.1em -0.05em 0;
      color: var(--ink);
    }

    article p { margin-bottom: 1.5em; }

    article h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.65rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.3;
      margin: 2.5em 0 0.8em;
      color: var(--ink);
    }

    article h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 2.5em 0 0.5em;
    }

    blockquote.pull {
      margin: 2.5em -3rem;
      padding: 1.8rem 3rem;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      background: var(--paper-warm);
    }

    blockquote.pull p {
      font-size: 1.5rem;
      font-weight: 300;
      font-style: italic;
      line-height: 1.5;
      color: var(--ink);
      margin: 0;
    }

    blockquote.pull p::before { content: '\201C'; color: var(--accent-dim); }
    blockquote.pull p::after  { content: '\201D'; color: var(--accent-dim); }

    blockquote.pull cite {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-style: normal;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-top: 0.8rem;
    }

    blockquote.inline {
      margin: 1.5em 0 1.5em 2rem;
      padding-left: 1.2rem;
      border-left: 2px solid var(--accent-dim);
    }

    blockquote.inline p { font-style: italic; color: var(--ink-light); margin: 0; }

    sup a {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      color: var(--accent);
      text-decoration: none;
    }

    /* ─── Author Bio ─────────────────────────────────────── */
    .author-bio {
      max-width: var(--col);
      margin: 0 auto;
      padding: 3rem 2rem;
      border-top: 1px solid var(--rule);
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    .author-bio .author-avatar { width: 60px; height: 60px; font-size: 1.1rem; }

    .author-bio-text h4 {
      font-family: 'Cormorant SC', serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    .author-bio-text p {
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--ink-light);
    }

    /* ─── Tags ───────────────────────────────────────────── */
    .tags {
      max-width: var(--col);
      margin: 0 auto;
      padding: 0 2rem 3rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--rule);
      border-radius: 2px;
      padding: 0.25rem 0.7rem;
      color: var(--ink-light);
      text-decoration: none;
      transition: all 0.2s;
    }

    .tag:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── Related ─────────────────────────────────────────── */
    .related {
      background: var(--paper-warm);
      border-top: 1px solid var(--rule);
      padding: 4rem 2rem;
      margin-top: 2rem;
    }

    .related-inner { max-width: var(--wide); margin: 0 auto; }

    .related h2 {
      font-family: 'Cormorant SC', serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 2.5rem;
    }

    .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.5rem; }

    .related-card { text-decoration: none; color: inherit; }

    .related-card-cat {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .related-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 0.5rem;
      transition: color 0.2s;
    }

    .related-card:hover h3 { color: var(--accent); }

    .related-card p {
      font-size: 0.82rem;
      color: var(--ink-faint);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.6;
    }

    /* ─── Category Page ──────────────────────────────────── */
    .category-page {
      max-width: var(--col);
      margin: 0 auto;
      padding: 4rem 2rem 5rem;
    }

    .category-header {
      margin-bottom: 2rem;
    }

    .category-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 300;
      line-height: 1.15;
      margin: 0.5rem 0 1rem;
    }

    .essay-list { margin-top: 2rem; }

    .essay-list-item {
      display: block;
      text-decoration: none;
      color: inherit;
      padding: 2rem 0;
      border-bottom: 1px solid var(--rule);
      transition: opacity 0.2s;
    }

    .essay-list-item:first-child { border-top: 1px solid var(--rule); }
    .essay-list-item:hover { opacity: 0.7; }

    .essay-list-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
    }

    .essay-list-item h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .essay-list-item p {
      font-size: 0.95rem;
      color: var(--ink-light);
      margin-bottom: 0.75rem;
      font-style: italic;
    }

    .read-more {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    /* ─── Footer ─────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 2.5rem 2rem;
      border-top: 1px solid var(--rule);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--ink-faint);
    }

    footer a { color: var(--ink-faint); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ─── Responsive ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; gap: 1.5rem; padding-top: 3rem; }
      .related-grid { grid-template-columns: 1fr; gap: 1.5rem; }
      .drawer-grid { grid-template-columns: repeat(2, 1fr); }
      blockquote.pull { margin: 2em 0; }
      .nav-links { display: none; }
      body { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div id="progress-bar"></div>

  <!-- ─── Navigation ─────────────────────────────────── -->
  <nav>
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="site-name">{{ site.title }}</a>
      <ul class="nav-links">
        {% for cat in site.categories_list %}
        <li><button data-category="{{ cat | downcase }}">{{ cat }}</button></li>
        {% endfor %}
        <li><a href="{{ '/about' | relative_url }}">About</a></li>
      </ul>
    </div>
  </nav>

  <!-- ─── Category Drawer ─────────────────────────────── -->
  <div id="category-drawer" role="region" aria-live="polite">
    <div class="drawer-inner">
      <div class="drawer-header">
        <span class="drawer-title" id="drawer-title"></span>
        <button class="drawer-close" id="drawer-close" aria-label="Close">Close ✕</button>
      </div>
      <div class="drawer-grid" id="drawer-grid"></div>
    </div>
  </div>

  <!-- ─── Page Content ────────────────────────────────── -->
  {{ content }}

  <!-- ─── Footer ─────────────────────────────────────── -->
  <footer>
    <p>© {{ 'now' | date: "%Y" }} {{ site.title }}&nbsp;·&nbsp;
      <a href="{{ '/about' | relative_url }}">About</a>&nbsp;·&nbsp;
      <a href="/feed.xml">RSS</a>
    </p>
  </footer>

  <!-- ─── Scripts ────────────────────────────────────── -->
  <script>
    /* ── Build article data from Jekyll ── */
    const ARTICLES = {
      {% for cat in site.categories_list %}
      "{{ cat | downcase }}": [
        {% assign cat_essays = site.essays | where: "category", cat | sort: "date" | reverse %}
        {% for essay in cat_essays %}
        {
          title:   {{ essay.title | jsonify }},
          excerpt: {{ essay.dek | truncate: 90 | jsonify }},
          href:    "{{ essay.url | relative_url }}",
          label:   {{ essay.label | default: essay.category | jsonify }}
        }{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ]{% unless forloop.last %},{% endunless %}
      {% endfor %}
    };

    /* ── Drawer logic ── */
    const drawer      = document.getElementById('category-drawer');
    const drawerTitle = document.getElementById('drawer-title');
    const drawerGrid  = document.getElementById('drawer-grid');
    const closeBtn    = document.getElementById('drawer-close');
    const navBtns     = document.querySelectorAll('.nav-links button[data-category]');

    let activeCategory = null;

    function openDrawer(category) {
      const articles = ARTICLES[category];
      if (!articles || articles.length === 0) return;

      navBtns.forEach(b => b.classList.toggle('active', b.dataset.category === category));
      drawerTitle.textContent = category.charAt(0).toUpperCase() + category.slice(1);
      drawerGrid.innerHTML = articles.map(a => `
        <a class="drawer-card" href="${a.href}">
          <div class="drawer-card-label">${a.label}</div>
          <h4>${a.title}</h4>
          <p>${a.excerpt}</p>
        </a>
      `).join('');

      drawer.classList.add('open');
      activeCategory = category;
    }

    function closeDrawer() {
      drawer.classList.remove('open');
      navBtns.forEach(b => b.classList.remove('active'));
      activeCategory = null;
    }

    navBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        btn.dataset.category === activeCategory ? closeDrawer() : openDrawer(btn.dataset.category);
      });
    });

    closeBtn.addEventListener('click', closeDrawer);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
    document.addEventListener('click', e => {
      if (activeCategory && !drawer.contains(e.target) && !e.target.closest('nav')) closeDrawer();
    });

    /* ── Reading progress ── */
    const bar = document.getElementById('progress-bar');
    window.addEventListener('scroll', () => {
      const total = document.documentElement.scrollHeight - window.innerHeight;
      if (total > 0) bar.style.width = (window.scrollY / total * 100) + '%';
    });
  </script>

</body>
</html>
